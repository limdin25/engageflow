# Use this file in Coolify: frontend only exposes 80 (no host port bind).
# Coolify proxy routes by hostname to container port 80.
# DB uses a named volume so it works on any host.
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: engageflow-backend
    expose:
      - "8000"
    volumes:
      - engageflow_db:/app/shared_db
    environment:
      - TZ=Europe/London
      - ENGAGEFLOW_DB_PATH=/app/shared_db/engageflow.db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Base must include /api so frontend requests go to origin/api/profiles etc. (nginx proxies /api/ to backend).
        VITE_BACKEND_URL: http://pcg4ogwwg8skosscg80sk4c8.187.124.112.114.sslip.io/api
    container_name: engageflow-frontend
    depends_on:
      - backend
    environment:
      - TZ=Europe/London
      - PORT=80
    expose:
      - "80"
    restart: unless-stopped

volumes:
  engageflow_db: {}
