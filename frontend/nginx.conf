server {
  listen ${PORT};
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Proxy API calls to backend (public Railway URL)
  location /api/ {
    proxy_pass https://engageflow-production.up.railway.app/;
    proxy_http_version 1.1;

    proxy_set_header Host engageflow-production.up.railway.app;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Required when proxying to HTTPS upstream
    proxy_ssl_server_name on;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
