name: Railway Autonomy

on:
  push:
    branches: [dev]
  workflow_dispatch:

jobs:
  railway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Link project and set variables
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway link ${{ secrets.RAILWAY_PROJECT_ID }} --service backend
          railway variables set ENGAGEFLOW_DEBUG=1 --service backend
          echo "Railway vars updated."
