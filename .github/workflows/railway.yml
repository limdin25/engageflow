name: Railway Autonomy

on:
  push:
    branches: [dev, main]
  workflow_dispatch:
    inputs:
      target:
        description: "dev or main"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - main

jobs:
  railway-dev:
    if: github.ref == 'refs/heads/dev' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'dev')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Link project and set variables (DEV)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway link ${{ secrets.RAILWAY_PROJECT_ID }} --service backend
          railway variables set ENGAGEFLOW_DEBUG=1 --service backend
          echo "Railway DEV vars updated."

  railway-main:
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Link project and set variables (PRODUCTION)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PROD }}
        run: |
          railway link ${{ secrets.RAILWAY_PROJECT_ID }} --service backend
          railway variables set ENGAGEFLOW_DEBUG=0 --service backend
          echo "Railway PROD vars updated."
